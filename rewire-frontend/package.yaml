name:         rewire-frontend
version:      2.8
synopsis:     "A Haskell-to-Verilog/VHDL compiler, front end (HSE plus Crust)"
description:  "The ReWire front end. The GHC driver and Core-to-Crust bridge (ReWire.GHC.*), the Crust typed functional IR and its transformations (ReWire.Crust.*), and the pass-pipeline orchestration. Produces a ReWire.Hyle device; depends on rewire-backend for the Hyle IR and RTL backends and on rewire-base for shared utilities."
license:      BSD3
license-file: LICENSE
category:     Language
build-type:   Simple
github:       rewire-hardware/ReWire/rewire-frontend
maintainer:   Chris Hathhorn <hathhorn@gmail.com>
author:
- Adam Procter
- Chris Hathhorn <hathhorn@gmail.com>
- Ian Graves
- William L. Harrison
- Matthew Heimerdinger

ghc-options:
- -Wall
- -Werror
- -Wunused-packages
- -fno-warn-name-shadowing
- -funbox-strict-fields
- -O2
- -optc-O3
- -j8 +RTS -A64m -RTS
default-extensions:
- LambdaCase
- TupleSections
- ViewPatterns

extra-source-files:
- README.md

dependencies:
- rewire-base >= 2.8
- rewire-backend >= 2.8
- base ^>= 4.20
- containers ^>= 0.7
- deepseq ^>= 1.5
- directory ^>= 1.3
- filepath ^>= 1.5
- ghc ^>= 9.10
- ghc-paths ^>= 0.1
- ghc-typelits-extra ^>= 0.4
- ghc-typelits-knownnat ^>= 0.7
- ghc-typelits-natnormalise ^>= 0.7
- hashable ^>= 1.5
- lens ^>= 5.3
- megaparsec ^>= 9.7
- mtl ^>= 2.3
- process ^>= 1.6
- template-haskell ^>= 2.22
- text ^>= 2.1
- unordered-containers ^>= 0.2
- yaml ^>= 0.11

library:
  source-dirs: src
