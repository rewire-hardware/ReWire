name: Tutorial

# Builds the mdbook tutorial (source lives here on master under
# tutorial/rewire-by-example) and publishes the rendered HTML into the
# gh-pages branch at /tutorial/, alongside the hand-maintained Jekyll site.
# keep_files: true means only the tutorial/ subdir is replaced; the rest of
# the gh-pages site is left untouched.

on:
  push:
    branches: [master]
    paths:
      - 'tutorial/rewire-by-example/**'
      - '.github/workflows/tutorial.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tutorial-gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build the book
        run: mdbook build tutorial/rewire-by-example

      - name: Publish to gh-pages/tutorial
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: tutorial/rewire-by-example/book
          destination_dir: tutorial
          keep_files: true
          # The rest of gh-pages is a Jekyll site (index.md -> index.html is
          # built by GitHub Pages). Without this, actions-gh-pages drops a
          # .nojekyll file that disables Jekyll for the whole site -> 404 at /.
          enable_jekyll: true
          commit_message: 'Deploy tutorial from ${{ github.sha }}'
