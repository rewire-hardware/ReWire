name:         rewire
version:      2.8
synopsis:     A Haskell-to-Verilog compiler
description:  A compiler for a subset of Haskell to Verilog and VHDL.
license:      BSD3
license-file: LICENSE
category:     Language
build-type:   Simple
github:       rewire-hardware/ReWire
maintainer:   Chris Hathhorn <hathhorn@gmail.com>
author:
- Adam Procter
- Chris Hathhorn <hathhorn@gmail.com>
- Ian Graves
- William L. Harrison
- Matthew Heimerdinger

ghc-options:
- -Wall
- -Werror
- -Wunused-packages
- -fno-warn-name-shadowing
- -funbox-strict-fields
- -O2
- -optc-O3
- -j8 +RTS -A64m -RTS
default-extensions:
- LambdaCase
- TupleSections
- ViewPatterns

extra-source-files:
- README.md
data-files:
- tests/negative/*.hs
- tests/negative/*.rwc
- tests/negative/cry/*.cry
- tests/warning/*.hs
- tests/warning/cry/*.cry
- tests/golden/Mods/*.hs
- tests/golden/OD19/*.hs
- tests/golden/Mods/C/*.hs
- tests/golden/verilog/*.sv
- tests/golden/vhdl/*.vhdl
- tests/golden/*.hs
- tests/golden/*.sv
- tests/golden/*.rwc
- tests/golden/*.vhdl
- tests/golden/*.cry
- tests/golden/cry/*.cry
- tests/golden/*.yaml
- tests/integration/*.hs
- tests/integration/*.sv
- tests/integration/*.rwc
- tests/integration/*.vhdl
- tests/integration/*.cry
- tests/integration/*.yaml
- tests/integration/cry/*.cry
- tests/eidos/*.eir
- tests/eidos/negative/*.eir
- rewire-user/src/*.hs
- rewire-user/src/RWC/*.hs
- rewire-user/src/ReWire/*.hs
- tutorial/*/*
- tutorial/*/*/*
- tutorial/*/*/*/*

dependencies:
- base ^>= 4.20

library:
  source-dirs: src
  dependencies:
  - rewire-base
  - rewire-frontend
  - rewire-embedder
  - filepath ^>= 1.5
  - lens ^>= 5.3
  - text ^>= 2.1

executables:
  rwc:
    source-dirs: apps/rwc
    main: Main.hs
    dependencies:
    - rewire

  rwe:
    source-dirs: apps/rwe
    main: Main.hs
    dependencies:
    - rewire

benchmarks:
  rwc-perf:
    source-dirs: apps/rwc-perf
    main: Main.hs
    dependencies:
    - rewire
    - directory ^>= 1.3
    - filepath ^>= 1.5

tests:
  rwc-test:
    source-dirs: apps/rwc-test
    main: Main.hs
    dependencies:
    - rewire
    - rewire-base
    - rewire-backend
    - rewire-frontend
    - mtl ^>= 2.3
    - text ^>= 2.1
    - unordered-containers ^>= 0.2
    - yaml ^>= 0.11
    - directory ^>= 1.3
    - process ^>= 1.6
    - filepath ^>= 1.5
    - tasty ^>= 1.5
    - tasty-hunit ^>= 0.10
    - tasty-golden ^>= 2.3

  rwe-test:
    source-dirs: apps/rwe-test
    main: Main.hs
    dependencies:
    - text ^>= 2.1
    - directory ^>= 1.3
    - process ^>= 1.6
    - filepath ^>= 1.5
    - tasty ^>= 1.5
    - tasty-hunit ^>= 0.10
