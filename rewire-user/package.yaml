name:         rewire-user
version:      2.8
description:  Please see the README.
github:       rewire-hardware/ReWire/rewire-user
license:      BSD3
license-file: LICENSE
maintainer:   Chris Hathhorn <hathhorn@gmail.com>
author:
- Matthew Heimerdinger
- Chris Hathhorn

ghc-options:
- -Wall
- -Werror
- -Wunused-packages
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

extra-source-files:
- README.md

dependencies:
- base >= 4.7 && < 5

library:
  source-dirs: src
  # The typelits solver plugins, for GHC builds of this package. (rwc
  # doesn't read these flags: its GHC session injects the same plugins
  # statically -- see ReWire.GHC.Session -- so the library sources must
  # not carry per-module -fplugin pragmas, which would make the session
  # dynamically load the plugins from a package database.)
  ghc-options:
  - -fplugin=GHC.TypeLits.Normalise
  - -fplugin=GHC.TypeLits.KnownNat.Solver
  - -fplugin=GHC.TypeLits.Extra.Solver
  dependencies:
  - mtl
  - monad-resumption
  - vector-sized
  - vector
  - finite-typelits
  - ghc-typelits-natnormalise
  - ghc-typelits-knownnat
  - ghc-typelits-extra

tests:
  rewire-user-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - rewire-user
    - tasty
    - tasty-hunit
    - mtl
    - monad-resumption
    - ghc-typelits-natnormalise
