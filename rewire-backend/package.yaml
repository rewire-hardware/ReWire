name:         rewire-backend
version:      2.8
synopsis:     "A Haskell-to-Verilog/VHDL compiler, the Hyle backend"
description:  "The ReWire backend. The Hyle bit-level IR, its checker, optimizer, interpreter, and parser, and the Verilog, VHDL, and Cryptol RTL backends. Builds on rewire-base for shared utilities."
license:      BSD3
license-file: LICENSE
category:     Language
build-type:   Simple
github:       rewire-hardware/ReWire/rewire-backend
maintainer:   Chris Hathhorn <hathhorn@gmail.com>
author:
- Adam Procter
- Chris Hathhorn <hathhorn@gmail.com>
- Ian Graves
- William L. Harrison
- Matthew Heimerdinger

ghc-options:
- -Wall
- -Werror
- -Wunused-packages
- -fno-warn-name-shadowing
- -funbox-strict-fields
- -O2
- -optc-O3
- -j8 +RTS -A64m -RTS
default-extensions:
- LambdaCase
- TupleSections
- ViewPatterns

extra-source-files:
- README.md
- vhdl/rw_helpers.vhdl

dependencies:
- rewire-base >= 2.8
- base ^>= 4.20
- containers ^>= 0.7
- ghc-boot ^>= 9.10
- hashable ^>= 1.5
- lens ^>= 5.3
- machines ^>= 0.7
- megaparsec ^>= 9.7
- mtl ^>= 2.3
- template-haskell ^>= 2.22
- text ^>= 2.1
- unordered-containers ^>= 0.2

library:
  source-dirs: src
