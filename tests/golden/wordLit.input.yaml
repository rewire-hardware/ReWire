# wordLit: combinational device, output = zext16(__in0) XOR 16'h1.
# ReacT input type is (W 8); the single 8-bit input wire __in0 carries it directly
# (no tag/struct; the W 8 is just an 8-bit unsigned integer, MSB-first).
# Output __out0 (W 16) = (__in0 zero-extended to 16 bits) XOR 1.
# Since __in0 <= 255, the high byte of __out0 is always 0 and the low byte is __in0 XOR 1
# (i.e. flip the least-significant bit of __in0).
#
# Sequence exercises: 0, 1, the LSB toggle (XOR 1 flips even<->odd), small values,
# powers of two, max byte 255, and assorted bit patterns.
- __in0: 0      # -> 0 XOR 1   = 1    (0x0001)
- __in0: 1      # -> 1 XOR 1   = 0    (0x0000)
- __in0: 2      # -> 2 XOR 1   = 3    (0x0003)
- __in0: 3      # -> 3 XOR 1   = 2    (0x0002)
- __in0: 4      # -> 4 XOR 1   = 5    (0x0005)
- __in0: 7      # -> 7 XOR 1   = 6    (0x0006)
- __in0: 8      # -> 8 XOR 1   = 9    (0x0009)
- __in0: 15     # -> 15 XOR 1  = 14   (0x000e)
- __in0: 16     # -> 16 XOR 1  = 17   (0x0011)
- __in0: 42     # -> 42 XOR 1  = 43   (0x002b)
- __in0: 85     # -> 85 XOR 1  = 84   (0x0054)  (0b01010101)
- __in0: 170    # -> 170 XOR 1 = 171  (0x00ab)  (0b10101010)
- __in0: 128    # -> 128 XOR 1 = 129  (0x0081)
- __in0: 127    # -> 127 XOR 1 = 126  (0x007e)
- __in0: 254    # -> 254 XOR 1 = 255  (0x00ff)
- __in0: 255    # -> 255 XOR 1 = 254  (0x00fe)
