# fibo3: Fibonacci state machine driven by a 1-bit "advance" input.
#
# Device (fibo3.hs): ReacT Bit (W 8) over StateT (Vec 2 (W 8)).
#   State is a Fibonacci pair [a, b], initialized to [0, 1].
#   Each cycle the combinational output __out0 = first state = head = the pair's
#   element 0, taken AFTER applying this cycle's input:
#     - input False (0): advance the pair  [a,b] -> [b, a+b]  (8-bit wrap)
#     - input True  (1): hold (no state change)
#
# Input encoding: __in0 is the 1-bit `Bit` argument to `signal` (the ReacT input).
#   True = 1, False = 0.  Output is W 8 (8 bits), MSB-first; shown as hex.
#
# Sequence (20 cycles): mixes holds and runs of advances to exercise distinct
# Fibonacci values, hold/advance transitions, and 8-bit overflow at the tail.
#   Expected __out0 (hex): 00 01 01 01 01 02 03 03 05 08 0d 15 22 37 59 90 90 e9 79 62
#   Note the wrap: cycle 17 advance computes 144+233=377 -> 0xe9 (121) in the tail,
#   surfacing as head 0x79 (121) at cycle 18 and 0x62 (98) at cycle 19.
- __in0: 1
- __in0: 0
- __in0: 1
- __in0: 1
- __in0: 0
- __in0: 0
- __in0: 0
- __in0: 1
- __in0: 0
- __in0: 0
- __in0: 0
- __in0: 0
- __in0: 0
