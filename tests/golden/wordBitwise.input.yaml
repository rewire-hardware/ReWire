# wordBitwise interpreter stimulus.
#
# Device: purely combinational. ReacT input is a 3-tuple (W 8, W 8, W 8) = (u, v, w).
# Tuple fields are concatenated MSB-first across the three input wires, so each
# field maps directly to its own 8-bit wire:
#   __in0 = u   __in1 = v   __in2 = w   (each 0..255, decimal)
# Output (W 8 on __out0, decimal/hex) each cycle:
#   compute(u,v,w) = ((u .&. v) ^ w) .|. bnot ((bnot u .&. bnot v) ^ w)
# with fixity .&. (5) > ^/~^ (4) > .|. (3); ~^ is XNOR = bnot . (^).
# No registers, so cycle N output depends only on cycle N input (no lag).
#
# Sequence exercises: classic AABBCC test patterns, all-0/all-1 corners,
# single-wire isolation, alternating 0x55/0xAA bit patterns, single hot bits,
# arbitrary mixes, nibble splits, and the de Morgan / XNOR term coverage.
#
# Expected __out0 per cycle (hex): 7e 00 00 ff ff ff ff ff 07 e0
#                                  66 e6 ef ff ff ff ff 00 00 ff
