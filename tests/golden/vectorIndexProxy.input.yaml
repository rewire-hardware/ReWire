# vectorIndexProxy interpreter golden input.
#
# Device (vectorIndexProxy.hs): combinational, no state.
#   Input  = (Vec 16 (Vec 8 (W 8)), Vec 4 (W 8))   -> __in0 (1024b), __in1 (32b)
#   Output = Vec 8 (W 8)                            -> __out0 (64b)
#   out_i = (w ! 3) + (v_i ! 3)  for i in 0..7, where v_i = (rslice (Proxy::8) v) ! i
#   = element 3 of chunk i of the first 8 of the 16 outer-vec chunks, plus element 3 of w, mod 256.
#
# Bit layout (MSB-first cat):
#   __in0 = 16 chunks of 64b; chunk k occupies bits [1023-64k : 960-64k] (chunk 0 = MSB).
#           Only chunks 0..7 are read (rslice). Within a chunk, element 3 = bits [chunk_top-24 : chunk_top-31].
#   __in1 = 4 bytes; element 3 (w!3) = the LOW byte __in1[7:0].
#   __out0 = 8 bytes, out_0 in MSB [63:56] .. out_7 in LSB [7:0].
# Output at cycle N reflects the inputs at cycle N (purely combinational, verified empirically).
#
# Per-cycle: chunk-elem3 bytes for chunks 0..7, plus w!3, exercising ramps, 8-bit add wraparound,
# all-0xFF edges, identity (w3=0), single-chunk values, and assorted patterns.
# ramp 0x00..0x77 in chunk elem3; w3=1
