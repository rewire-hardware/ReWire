# UpCounter2: the ReacT input is a single Bit, on wire __in0 (1 bit wide).
#   __in0 = 0  -> increment the state (W8) by 1 (incW8).
#   __in0 = 1  -> rotate the state left by 1 (rolW8): shift left, the old MSB wraps into bit 0.
# The output __out0 (W8) each cycle is the NEW state value after applying that cycle's op
# (tick signals the current state and the chosen op updates it before the next cycle is observed).
# State (W8) starts at 0x00.
#
# This sequence mixes increment and rotate-left to exercise the device thoroughly:
#   - plain increments from zero,
#   - rotate-left with MSB clear (a simple <<1),
#   - rotate-left with MSB set, where the 1 wraps around into bit 0 (the device-specific edge case),
#     e.g. 0xB8 -> 0x71, 0xC5 -> 0x8B, 0x8B -> 0x17.
- __in0: 0   # inc  -> 0x01
- __in0: 1   # rol  -> 0x02
- __in0: 1   # rol  -> 0x04
- __in0: 0   # inc  -> 0x05
- __in0: 1   # rol  -> 0x0A
- __in0: 0   # inc  -> 0x0B
- __in0: 1   # rol  -> 0x16
- __in0: 0   # inc  -> 0x17
- __in0: 1   # rol  -> 0x2E
- __in0: 1   # rol  -> 0x5C
- __in0: 1   # rol  -> 0xB8
- __in0: 1   # rol  -> 0x71  (MSB wrap: 0xB8<<1=0x170 -> 0x70, |1)
- __in0: 1   # rol  -> 0xE2
- __in0: 1   # rol  -> 0xC5  (MSB wrap: 0xE2<<1=0x1C4 -> 0xC4, |1)
- __in0: 1   # rol  -> 0x8B  (MSB wrap: 0xC5<<1=0x18A -> 0x8A, |1)
- __in0: 1   # rol  -> 0x17  (MSB wrap: 0x8B<<1=0x116 -> 0x16, |1)
- __in0: 0   # inc  -> 0x18
- __in0: 0   # inc  -> 0x19
- __in0: 1   # rol  -> 0x32
- __in0: 1   # rol  -> 0x64
