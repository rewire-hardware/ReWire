# sigNothing: ReacT W8 (Maybe W8) (StateT W8 Identity) ()
#   start' = signal Nothing >>= \_ -> start'
# The device signals `Nothing` on every cycle and ignores its W8 input;
# the StateT W8 state is never updated (stays at zeroW8).
#
# Input encoding:
#   __in0 : W8 (8-bit unsigned), MSB-first. The whole 8 bits are the W8 value.
#
# Output encoding (Maybe W8, 2 ctors -> 1 tag bit at MSB):
#   __out0 : 1-bit tag  (0 = Nothing, 1 = Just)
#   __out1 : 8-bit W8 payload (only meaningful when tag = Just)
# Expected: every cycle yields Nothing -> __out0 = 0x0, __out1 = 0x0,
#           independent of the input (input is inert here).
#
# The sequence below varies __in0 widely (extremes, alternating bit patterns,
# walking ones) to demonstrate the output stays Nothing regardless of input.
- __in0: 0     # all zeros
- __in0: 255   # all ones
- __in0: 170   # 0b10101010
- __in0: 85    # 0b01010101
- __in0: 1     # LSB only
- __in0: 128   # MSB only
- __in0: 2
- __in0: 4
- __in0: 8
- __in0: 16
- __in0: 32
- __in0: 64
- __in0: 127   # 0b01111111
- __in0: 254   # 0b11111110
- __in0: 200
- __in0: 100
- __in0: 50
- __in0: 25
