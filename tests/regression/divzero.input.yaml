# divzero interpreter stimulus.
#
# Device (combinational, iter f): input a = W 8 on __in0, output W 16 on __out0.
#   b   = (a .&. 3) % 0   == a .&. 3   (x % 0 = x convention)
#   out = (a / b) ++ ((a % b) ^ (7 / 0))      where 7/0 = 0xff (all-ones)
#   high8 = (b==0) ? 0xff : a / b
#   low8  = ((b==0) ? a : a % b) ^ 0xff
# Encoding: __in0 is the raw 8-bit value of a (one nonneg int per cycle).
#
# Sequence exercises all four divisor classes (b = a&3 in {0,1,2,3}):
#   cycles 0-4 : b==0  -> x/0=0xff, x%0=x conventions (a=0,4,8,252,128)
#   cycles 5-8 : b==1  -> exact divide, zero remainder (a=1,5,129,253)
#   cycles 9-11: b==2  -> divide by 2 (a=2,6,254)
#   cycles 12-15: b==3 -> nonzero quotients & remainders (a=3,7,255,171)
