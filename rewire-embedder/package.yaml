name:         rewire-embedder
version:      2.8
synopsis:     A ReWire-to-Isabelle embedder
description:  For verification using the ReWire hardware description language
license:      BSD3
license-file: LICENSE
category:     Language
build-type:   Simple
github:       rewire-hardware/ReWire/rewire-embedder
maintainer:
- Matthew Heimerdinger <matthew.heimerdinger@gmail.com>
- Chris Hathhorn <hathhorn@gmail.com>
author:
- Adam Procter
- Chris Hathhorn <hathhorn@gmail.com>
- Ian Graves
- William L. Harrison
- Matthew Heimerdinger

ghc-options:
- -Wall
- -Werror
- -Wunused-packages
- -fno-warn-name-shadowing
- -funbox-strict-fields
- -O2
- -optc-O3
- -j8 +RTS -A64m -RTS
default-extensions:
- LambdaCase
- TupleSections
- ViewPatterns

extra-source-files:
- README.md

dependencies:
- rewire-frontend >= 2.8
- rewire-base >= 2.8
- base ^>= 4.20
- containers ^>= 0.7
- deepseq ^>= 1.5
- filepath ^>= 1.5
- hashable ^>= 1.5
- haskell-src-exts ^>= 1.23
- lens ^>= 5.3
- mtl ^>= 2.3
- prettyprinter ^>= 1.7
- split ^>= 0.2
- directory ^>= 1.3
- text ^>= 2.1
- unordered-containers ^>= 0.2

library:
  source-dirs: src
